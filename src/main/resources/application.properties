spring.application.name=naturehood_backend

# ===== Server =====
server.port=8080

# ===== MongoDB =====
# Injected from MONGODB_URI env var (set in .env / docker-compose environment block).
spring.data.mongodb.uri=${MONGODB_URI}

# ===== Redis =====
# SPRING_DATA_REDIS_HOST / _PORT / _PASSWORD are the Spring-canonical env var names.
# docker-compose.yml sets SPRING_DATA_REDIS_HOST=redis (the service name).
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${SPRING_DATA_REDIS_SSL_ENABLED:false}
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2

# ===== Supabase JWKS (RS256) =====
# Full URLs — paste them as plain strings in .env, no quoting needed.
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SUPABASE_JWKS_URI}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${SUPABASE_ISSUER_URI}

# ===== Feed Algorithm Tuning =====
feed.timeline.max-size=${FEED_TIMELINE_MAX_SIZE:2000}
feed.default-page-size=${FEED_DEFAULT_PAGE_SIZE:20}
feed.score.recency-weight=${FEED_SCORE_RECENCY_WEIGHT:0.5}
feed.score.engagement-weight=${FEED_SCORE_ENGAGEMENT_WEIGHT:0.3}
feed.score.affinity-weight=${FEED_SCORE_AFFINITY_WEIGHT:0.2}

# ===== Explore Feed (stranger posts) =====
feed.explore.max-inject-per-post=${FEED_EXPLORE_MAX_INJECT_PER_POST:50}
feed.explore.lookback-hours=${FEED_EXPLORE_LOOKBACK_HOURS:48}

# ===== Timeline Warm-up (Redis crash recovery) =====
feed.warmup.lookback-hours=${FEED_WARMUP_LOOKBACK_HOURS:72}

# ===== SSE =====
sse.emitter.timeout-ms=${SSE_EMITTER_TIMEOUT_MS:300000}

# ===== Redis Pub/Sub channel =====
redis.channel.feed=${REDIS_CHANNEL_FEED:channel:feed}

# ===== Kafka (available for future async events) =====
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=naturehood-feed
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# ===== Jackson =====
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ===== Logging =====
logging.level.com.naturehood=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=INFO
logging.level.org.springframework.data.mongodb=INFO

# ===== AI Usage Reset Cron =====
# Express parity:
# - user_ai_usage.food_analysis_count -> 0
# - user_ai_usage.work_out_log_count -> 0
# Defaults to daily midnight UTC.
ai.usage.reset.cron=${AI_USAGE_RESET_CRON:0 0 0 * * *}
ai.usage.reset.timezone=${AI_USAGE_RESET_TIMEZONE:UTC}
