services:
  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: naturehood-redis
    restart: unless-stopped
    # Removed privileged: true for security
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    # REMOVED ports: - "6379:6379" (Keep it private to the Docker network)
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Nginx ──────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  # ─── Spring Boot Backend ────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: naturehood-backend
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    # REMOVED ports: - "8080:8080" (Only Nginx needs to talk to this)
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_DATA_REDIS_SSL_ENABLED: "false"

      MONGODB_URI: ${MONGODB_URI}
      SUPABASE_JWKS_URI: ${SUPABASE_JWKS_URI}
      SUPABASE_ISSUER_URI: ${SUPABASE_ISSUER_URI}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

      # Fix: Use an actual IP or service name if Kafka is added
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-172.17.0.1:9092}

      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AI_USAGE_RESET_CRON: "${AI_USAGE_RESET_CRON:-0 0 * * *}"
      AI_USAGE_RESET_TIMEZONE: ${AI_USAGE_RESET_TIMEZONE:-UTC}

volumes:
  redis_data:
    driver: local
