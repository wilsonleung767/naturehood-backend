# 1. HTTP server — GCP LB terminates SSL and sends plain HTTP here
server {
    listen 80;
    server_name _;

    keepalive_timeout 650s;
    client_max_body_size 10M;

    location / {
        proxy_pass http://backend:8080;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

# 2. Optimized HTTPS Server
server {
    listen 443 ssl;
    http2 on;
    server_name api.naturehoodofficial.com;

    # SSL Certificate Paths (ensure these point to your Let's Encrypt or custom certs)
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Performance & Security Optimization
    ssl_protocols TLSv1.2 TLSv1.3; # Enable TLS 1.3 for 1-RTT handshake
    ssl_prefer_server_ciphers off;
    
    # SSL Session Optimization (Fixes handshake slowness)
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets on;
    
    # HSTS (prevent SSL stripping)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # OCSP Stapling (Speeds up cert validation)
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    keepalive_timeout 650s;
    client_max_body_size 10M;

    location / {
        proxy_pass http://backend:8080;
        
        # Improved Host Header
        proxy_set_header Host $host; 
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep-alive connections to backend
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
    }
}